services:
  api:
    build: ./apps/api
    container_name: worktreee-api
    user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./data:/data
      - ${HOME}/Documents:${HOME}/Documents
      - ${HOME}/.ssh:${HOME}/.ssh:ro
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.config/gh:${HOME}/.config/gh:ro
      - ${HOME}/.mcp-auth:${HOME}/.mcp-auth:ro
      - ${HOME}/.cache/JetBrains:${HOME}/.cache/JetBrains:ro
    environment:
      - HOME=${HOME}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-claude-sonnet-4-20250514}
      - DATA_PATH=/data
      - LOCAL_MACHINE=${LOCAL_MACHINE:-local}
      - CLIENT_MACHINE=${CLIENT_MACHINE:-mac}
      - LOCAL_SSH_ADDR=${LOCAL_SSH_ADDR}
      - REMOTE_HOSTS=${REMOTE_HOSTS}
      - JIRA_URL=${JIRA_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: worktreee-web
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
      - PORT=3000
    depends_on:
      - api
    restart: unless-stopped
