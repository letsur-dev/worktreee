services:
  api:
    build: ./apps/api
    container_name: pm-api
    user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./data:/data
      - /home/amos/Documents:/home/amos/Documents
      - /home/amos/.ssh:/home/amos/.ssh:ro
      - /home/amos/.claude:/home/amos/.claude
      - /home/amos/.config/gh:/home/amos/.config/gh:ro
      - /home/amos/.mcp-auth:/home/amos/.mcp-auth:ro
    environment:
      - HOME=/home/amos
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-claude-sonnet-4-20250514}
      - DATA_PATH=/data
      - JIRA_URL=${JIRA_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: pm-web
    ports:
      - "4000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
      - PORT=3000
    depends_on:
      - api
    restart: unless-stopped
